services:
  - type: web
    name: arcadins-training
    runtime: node
    rootDir: server
    buildCommand: npm install --production
    startCommand: node index.js
    plan: starter
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/arcadins.db
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false

    disk:
      name: arcadins-db
      mountPath: /data
      sizeGB: 1
