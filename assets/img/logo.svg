<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6c06b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a07830;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d0d8e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8899bb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- ICON — geometric W-shield with upward arrow -->
  <!-- Outer frame (silver/grey) -->
  <path d="M10,14 L30,10 L50,14 L50,46 L30,58 L10,46 Z"
        fill="none" stroke="url(#silverGrad)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Inner bars (chart going up, gold) -->
  <rect x="17" y="36" width="5" height="12" rx="1" fill="url(#silverGrad)" opacity="0.7"/>
  <rect x="25" y="28" width="5" height="20" rx="1" fill="url(#goldGrad)" opacity="0.85"/>
  <rect x="33" y="22" width="5" height="26" rx="1" fill="url(#goldGrad)"/>

  <!-- Upward arrow tip (gold) -->
  <polygon points="35.5,12 30,22 41,22" fill="url(#goldGrad)"/>

  <!-- ARCADINS text -->
  <text x="68" y="42"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="26"
        font-weight="900"
        letter-spacing="2"
        fill="#ffffff">ARCADINS</text>

  <!-- TRAINING CENTER text -->
  <text x="69" y="57"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="10"
        font-weight="400"
        letter-spacing="4"
        fill="#8899bb">TRAINING CENTER</text>
</svg>
