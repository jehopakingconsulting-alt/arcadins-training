<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 68" width="280" height="68">
  <defs>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6c06b"/>
      <stop offset="55%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#a07830"/>
    </linearGradient>
    <linearGradient id="silverG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8899cc"/>
      <stop offset="100%" style="stop-color:#556699"/>
    </linearGradient>
  </defs>

  <!-- Outer frame (silver/navy) -->
  <path d="M6,12 L26,8 L46,12 L46,42 L26,54 L6,42 Z"
        fill="none" stroke="url(#silverG)" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Bar chart bars -->
  <rect x="13" y="32" width="5" height="10" rx="1" fill="url(#silverG)" opacity="0.75"/>
  <rect x="21" y="25" width="5" height="17" rx="1" fill="url(#goldG)" opacity="0.9"/>
  <rect x="29" y="19" width="5" height="23" rx="1" fill="url(#goldG)"/>

  <!-- Arrow tip -->
  <polygon points="31.5,10 26,19 37,19" fill="url(#goldG)"/>

  <!-- ARCADINS — dark navy for white navbar -->
  <text x="60" y="37"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="22"
        font-weight="900"
        letter-spacing="1.5"
        fill="#001f6b">ARCADINS</text>

  <!-- TRAINING CENTER -->
  <text x="61" y="51"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="9"
        font-weight="500"
        letter-spacing="3.5"
        fill="#8899bb">TRAINING CENTER</text>
</svg>
