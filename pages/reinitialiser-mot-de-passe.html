<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réinitialiser le mot de passe – ARCADINS Training Center</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    body { background: linear-gradient(135deg, #0a1628, #1a2d5a, #0a1628); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: inherit; }
    .access-card { background: white; border-radius: 20px; padding: 48px 44px; max-width: 520px; width: 100%; box-shadow: 0 24px 80px rgba(0,0,0,.35); }
    .access-logo { text-align: center; margin-bottom: 28px; }
    .access-logo img { height: 52px; }
    .access-logo h2 { font-size: 1.1rem; color: var(--blue-dark); font-weight: 700; margin-top: 8px; }
    .access-card h1 { font-size: 1.5rem; font-weight: 800; color: var(--blue-dark); text-align: center; margin-bottom: 6px; }
    .access-card .sub { font-size: .88rem; color: var(--gray-text); text-align: center; margin-bottom: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .form-group label { font-size: .82rem; font-weight: 600; color: var(--blue-dark); }
    .form-group input { border: 2px solid #e0e6f0; border-radius: 8px; padding: 10px 12px; font-family: inherit; font-size: .9rem; transition: .25s; outline: none; }
    .form-group input:focus { border-color: var(--blue); }
    .btn-access { width: 100%; background: linear-gradient(135deg, var(--blue), var(--blue-dark)); color: white; border: none; border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: .3s; margin-top: 8px; }
    .btn-access:hover { opacity: .9; transform: translateY(-1px); }
    .btn-access:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .access-error { background: #fff0f0; border: 1.5px solid #ffcccc; color: var(--red); border-radius: 8px; padding: 10px 14px; font-size: .85rem; margin-top: 12px; display: none; }
    .access-success { background: #eaf7f0; border: 1.5px solid #a8ddc0; color: #0B5D3B; border-radius: 8px; padding: 10px 14px; font-size: .85rem; margin-top: 12px; display: none; }
    .login-link { text-align: center; margin-top: 16px; font-size: .85rem; color: var(--gray-text); }
    .login-link a { color: var(--blue); font-weight: 600; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
<div class="access-card">
  <div class="access-logo">
    <img src="../assets/img/logo-nav.svg" alt="ARCADINS Training Center" onerror="this.style.display='none'">
    <h2>ARCADINS Training Center</h2>
  </div>

  <div id="resetSection">
    <h1 data-i18n="acc.reset.h1">Réinitialiser le mot de passe</h1>
    <p class="sub" data-i18n="acc.reset.sub">Choisissez un nouveau mot de passe pour votre compte.</p>
    <form id="resetForm" novalidate>
      <div class="form-group">
        <label data-i18n="acc.reset.newpass">Nouveau mot de passe</label>
        <div style="position:relative;">
          <input type="password" id="rPass1" placeholder="••••••••" required minlength="6" style="width:100%;box-sizing:border-box;padding-right:42px;" />
          <button type="button" onclick="toggleVisibility('rPass1','eye1')" aria-label="Afficher/masquer le mot de passe" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;line-height:1;padding:4px;">
            <span id="eye1">👁️</span>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label data-i18n="acc.reset.confirm">Confirmer le mot de passe</label>
        <div style="position:relative;">
          <input type="password" id="rPass2" placeholder="••••••••" required minlength="6" style="width:100%;box-sizing:border-box;padding-right:42px;" />
          <button type="button" onclick="toggleVisibility('rPass2','eye2')" aria-label="Afficher/masquer le mot de passe" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;line-height:1;padding:4px;">
            <span id="eye2">👁️</span>
          </button>
        </div>
      </div>
      <div class="access-error" id="resetError"></div>
      <div class="access-success" id="resetSuccess"></div>
      <button type="submit" class="btn-access" id="resetBtn" data-i18n="acc.reset.btn">Réinitialiser mon mot de passe</button>
    </form>
    <div class="login-link" style="margin-top:14px;">
      <a href="acces.html" data-i18n="acc.reset.goLogin">Aller à la connexion →</a>
    </div>
  </div>
</div>

<script src="../assets/js/config.js?v=202606131336"></script>
<script src="../assets/js/i18n.js?v=202606131336"></script>
<script src="../assets/js/api.js?v=202606131336"></script>
<script>
function toggleVisibility(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  if (input.type === 'password') {
    input.type = 'text';
    icon.textContent = '🙈';
  } else {
    input.type = 'password';
    icon.textContent = '👁️';
  }
}

const params = new URLSearchParams(location.search);
const token = params.get('token');

document.getElementById('resetForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const pass1 = document.getElementById('rPass1').value;
  const pass2 = document.getElementById('rPass2').value;
  const errEl = document.getElementById('resetError');
  const successEl = document.getElementById('resetSuccess');
  const btn = document.getElementById('resetBtn');
  errEl.style.display = 'none';
  successEl.style.display = 'none';

  const lang = typeof currentLang !== 'undefined' ? currentLang : 'fr';

  if (!token) {
    errEl.textContent = lang === 'fr' ? 'Lien invalide ou expiré. Veuillez refaire une demande.' : 'Invalid or expired link. Please request a new one.';
    errEl.style.display = 'block';
    return;
  }

  if (pass1 !== pass2) {
    errEl.textContent = lang === 'fr' ? 'Les mots de passe ne correspondent pas.' : 'Passwords do not match.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = '...';

  try {
    const res = await fetch(API_BASE + '/access/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass1 })
    });
    const d = await res.json();
    if (!res.ok || !d.success) throw new Error(d.message || 'Erreur');

    successEl.textContent = d.message;
    successEl.style.display = 'block';
    document.getElementById('resetForm').style.display = 'none';
  } catch(err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = document.querySelector('[data-i18n="acc.reset.btn"]')?.textContent || 'Réinitialiser';
  }
});
</script>
</body>
</html>
